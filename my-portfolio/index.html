<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sushmitha Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header>
    <nav>
      <h1>Sushmitha</h1>
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- About Section -->
  <main>
    <section id="about">
      <h2>About Me</h2>
      <p>I am an MCA fresher passionate about web development and AI projects.</p>
      <img src="images/profile.jpg" alt="Profile photo of Sushmitha">
    </section>

    <!-- Projects Section -->
    <section id="projects">
      <h2>Projects</h2>
      <div class="projects-grid">

        <!-- Project 1: AI Plagiarism Detector -->
        <div class="card">
          <h3>AI Plagiarism Detector</h3>
          <img src="images/project1-home.png" alt="AI Plagiarism Detector homepage/input screen">
          <img src="images/project1-result.png" alt="AI Plagiarism Detector result page">
          <p>Upload documents or text and check for plagiarism using Python and Flask.</p>
          <a href="https://github.com/yourusername/project1" target="_blank">View Code</a>
        </div>

      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
      <h2>Contact Me</h2>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Sushmitha | <a href="https://github.com/yourusername">GitHub</a></p>
  </footer>

</body>
</html>
